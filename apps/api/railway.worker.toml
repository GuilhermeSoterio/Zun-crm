[build]
builder = "nixpacks"
buildCommand = "npm install -g pnpm@10.33.0 && pnpm install --frozen-lockfile && pnpm --filter api exec prisma generate && pnpm --filter api build"

[deploy]
startCommand = "node apps/api/dist/worker-entry.js"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
